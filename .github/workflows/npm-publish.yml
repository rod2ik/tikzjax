name: Publish npm package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout known-good CDN runtime
        uses: actions/checkout@v6
        with:
          repository: rod2ik/cdn
          path: cdn-runtime

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Enable Corepack
        run: corepack enable

      - name: Install TeX Live dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-pictures \
            texlive-science

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare required build runtime assets
        run: |
          test -f cdn-runtime/tikzjax/core.dump.gz
          test -f cdn-runtime/tikzjax/tex.wasm.gz

          cp -f cdn-runtime/tikzjax/core.dump.gz core.dump.gz
          cp -f cdn-runtime/tikzjax/tex.wasm.gz tex.wasm.gz

          echo "Required build runtime assets copied to repository root:"
          ls -lh core.dump.gz tex.wasm.gz

      - name: Build and validate dist
        run: yarn bfc

      - name: Replace TeX runtime with known-good CDN runtime
        run: |
          test -f cdn-runtime/tikzjax/core.dump.gz
          test -f cdn-runtime/tikzjax/tex.wasm.gz
          test -d cdn-runtime/tikzjax/tex_files
          test -f cdn-runtime/tikzjax/tex_files/l3backend-dvips.def.gz

          rm -rf dist/tex_files
          cp -f cdn-runtime/tikzjax/core.dump.gz dist/core.dump.gz
          cp -f cdn-runtime/tikzjax/tex.wasm.gz dist/tex.wasm.gz
          cp -R cdn-runtime/tikzjax/tex_files dist/tex_files

          echo "Known-good CDN runtime copied into dist:"
          ls -lh dist/core.dump.gz dist/tex.wasm.gz

          echo "Sample TeX runtime files:"
          find dist/tex_files -type f | sort | head -20

      - name: Verify required dist files
        run: |
          test -f dist/run-tex.js
          test -f dist/run-tex.min.js
          test -f dist/tikzjax.js
          test -f dist/tikzjax.min.js
          test -f dist/fonts.css
          test -f dist/fonts.min.css
          test -f dist/tex.wasm.gz
          test -f dist/core.dump.gz
          test -d dist/tex_files
          test -f dist/tex_files/l3backend-dvips.def.gz

          count="$(find dist/tex_files -type f | wc -l)"
          echo "TeX runtime file count: $count"

          test "$count" -gt 100

      - name: Check package contents
        run: |
          npm pack --dry-run
          npm pack --json > pack.json

          node - <<'NODE'
          const fs = require("fs");

          const pack = JSON.parse(fs.readFileSync("pack.json", "utf8"))[0];
          const files = new Set(pack.files.map((file) => file.path));

          const required = [
            "dist/run-tex.js",
            "dist/run-tex.min.js",
            "dist/tikzjax.js",
            "dist/tikzjax.min.js",
            "dist/fonts.css",
            "dist/fonts.min.css",
            "dist/tex.wasm.gz",
            "dist/core.dump.gz",
            "dist/tex_files/l3backend-dvips.def.gz"
          ];

          const missing = required.filter((file) => !files.has(file));

          if (missing.length) {
            console.error("Missing files from npm package:");

            for (const file of missing) {
              console.error(`- ${file}`);
            }

            process.exit(1);
          }

          const texRuntimeFiles = pack.files
            .map((file) => file.path)
            .filter((file) => file.startsWith("dist/tex_files/"));

          console.log(`TeX runtime files in npm package: ${texRuntimeFiles.length}`);

          if (texRuntimeFiles.length <= 100) {
            console.error("The npm package does not contain enough TeX runtime files.");
            process.exit(1);
          }

          console.log("All required files are present in the npm package.");
          NODE

      - name: Publish to npm
        run: npm publish --access public