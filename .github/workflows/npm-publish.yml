name: Publish npm package

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate tag against package.json version
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "npm publishing is only allowed from a Git tag."
            echo "For a manual run, select the release tag in the GitHub Actions interface."
            exit 1
          fi

          TAG_NAME="${GITHUB_REF_NAME}"

          PACKAGE_VERSION="$(
            python3 -c 'import json; print(str(json.load(open("package.json", encoding="utf-8")).get("version", "")).strip())'
          )"

          if [ -z "${PACKAGE_VERSION}" ]; then
            echo "package.json does not contain a valid version."
            exit 1
          fi

          EXPECTED_TAG="v${PACKAGE_VERSION}"

          echo "Tag name:             ${TAG_NAME}"
          echo "package.json version: ${PACKAGE_VERSION}"
          echo "Expected tag:          ${EXPECTED_TAG}"

          if [ "${TAG_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "The pushed tag must match package.json version with a leading v."
            echo "Expected tag: ${EXPECTED_TAG}"
            echo "Actual tag:   ${TAG_NAME}"
            exit 1
          fi

      - name: Checkout known-good CDN runtime
        uses: actions/checkout@v6
        with:
          repository: rod2ik/cdn
          path: cdn-runtime

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.16.0"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Setup npm and Yarn
        shell: bash
        run: |
          set -euo pipefail

          npm install --global npm@12.0.1

          corepack enable
          corepack prepare yarn@1.22.22 --activate

          echo "Node version:"
          node --version

          echo "npm version:"
          npm --version

          echo "Yarn version:"
          yarn --version

          test "$(node --version)" = "v24.16.0"
          test "$(npm --version)" = "12.0.1"
          test "$(yarn --version)" = "1.22.22"

      - name: Install TeX Live dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-pictures \
            texlive-science

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          yarn install --frozen-lockfile

      - name: Prepare required build runtime assets
        shell: bash
        run: |
          set -euo pipefail

          test -f cdn-runtime/tikzjax/core.dump.gz
          test -f cdn-runtime/tikzjax/tex.wasm.gz

          cp -f cdn-runtime/tikzjax/core.dump.gz core.dump.gz
          cp -f cdn-runtime/tikzjax/tex.wasm.gz tex.wasm.gz

          echo "Required build runtime assets copied to repository root:"
          ls -lh core.dump.gz tex.wasm.gz

      - name: Build and validate dist
        shell: bash
        run: |
          set -euo pipefail
          yarn bfc

      - name: Replace TeX runtime with known-good CDN runtime
        shell: bash
        run: |
          set -euo pipefail

          test -f cdn-runtime/tikzjax/core.dump.gz
          test -f cdn-runtime/tikzjax/tex.wasm.gz
          test -d cdn-runtime/tikzjax/tex_files
          test -f cdn-runtime/tikzjax/tex_files/l3backend-dvips.def.gz

          rm -rf dist/tex_files

          cp -f cdn-runtime/tikzjax/core.dump.gz dist/core.dump.gz
          cp -f cdn-runtime/tikzjax/tex.wasm.gz dist/tex.wasm.gz
          cp -R cdn-runtime/tikzjax/tex_files dist/tex_files

          echo "Known-good CDN runtime copied into dist:"
          ls -lh dist/core.dump.gz dist/tex.wasm.gz

          echo "Sample TeX runtime files:"
          find dist/tex_files -type f | sort | sed -n '1,20p'

      - name: Verify required dist files
        shell: bash
        run: |
          set -euo pipefail

          test -f dist/run-tex.js
          test -f dist/run-tex.min.js
          test -f dist/tikzjax.js
          test -f dist/tikzjax.min.js
          test -f dist/fonts.css
          test -f dist/fonts.min.css
          test -f dist/tex.wasm.gz
          test -f dist/core.dump.gz
          test -d dist/tex_files
          test -f dist/tex_files/l3backend-dvips.def.gz

          count="$(find dist/tex_files -type f | wc -l)"
          echo "TeX runtime file count: ${count}"

          test "${count}" -gt 100

      - name: Check package contents
        shell: bash
        run: |
          set -euo pipefail

          PACK_JSON="${RUNNER_TEMP}/tikzjax-pack.json"

          echo "Human-readable npm package preview:"
          npm pack --dry-run

          echo "Generating JSON package manifest:"
          npm pack --dry-run --json > "${PACK_JSON}"

          echo "npm pack JSON:"
          cat "${PACK_JSON}"

          node - "${PACK_JSON}" <<'NODE'
          const fs = require("fs");

          const packJsonPath = process.argv[2];

          if (!packJsonPath) {
            console.error("The npm pack JSON path was not provided.");
            process.exit(1);
          }

          const manifest = JSON.parse(
            fs.readFileSync("package.json", "utf8")
          );

          const parsed = JSON.parse(
            fs.readFileSync(packJsonPath, "utf8")
          );

          /*
           * npm <= 11:
           *
           * [
           *   {
           *     "name": "@rod2ik/tikzjax",
           *     "files": [...]
           *   }
           * ]
           *
           * npm >= 12:
           *
           * {
           *   "@rod2ik/tikzjax": {
           *     "name": "@rod2ik/tikzjax",
           *     "files": [...]
           *   }
           * }
           */
          const packEntries = Array.isArray(parsed)
            ? parsed
            : Object.values(parsed || {});

          const pack =
            packEntries.find(
              (entry) => entry?.name === manifest.name
            ) ||
            packEntries[0];

          if (!pack) {
            console.error(
              "npm pack returned no package entry."
            );

            console.error(
              JSON.stringify(parsed, null, 2)
            );

            process.exit(1);
          }

          if (!Array.isArray(pack.files)) {
            console.error(
              "npm pack did not return a files array."
            );

            console.error(
              JSON.stringify(pack, null, 2)
            );

            process.exit(1);
          }

          console.log(
            `Checking package: ${pack.name}@${pack.version}`
          );

          const files = new Set(
            pack.files.map((file) => file.path)
          );

          const required = [
            "dist/run-tex.js",
            "dist/run-tex.min.js",
            "dist/tikzjax.js",
            "dist/tikzjax.min.js",
            "dist/fonts.css",
            "dist/fonts.min.css",
            "dist/tex.wasm.gz",
            "dist/core.dump.gz",
            "dist/tex_files/l3backend-dvips.def.gz"
          ];

          const missing = required.filter(
            (file) => !files.has(file)
          );

          if (missing.length) {
            console.error(
              "Missing files from npm package:"
            );

            for (const file of missing) {
              console.error(`- ${file}`);
            }

            process.exit(1);
          }

          const texRuntimeFiles = pack.files
            .map((file) => file.path)
            .filter(
              (file) =>
                file.startsWith(
                  "dist/tex_files/"
                )
            );

          console.log(
            `TeX runtime files in npm package: ${texRuntimeFiles.length}`
          );

          if (texRuntimeFiles.length <= 100) {
            console.error(
              "The npm package does not contain enough TeX runtime files."
            );

            process.exit(1);
          }

          console.log(
            "All required files are present in the npm package."
          );
          NODE

      - name: Publish to npm
        shell: bash
        run: |
          set -euo pipefail
          npm publish --access public
