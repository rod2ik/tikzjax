name: Create GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create release from tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate tag against package.json version
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"

          PACKAGE_VERSION="$(
            python3 -c 'import json; print(str(json.load(open("package.json", encoding="utf-8")).get("version", "")).strip())'
          )"

          if [ -z "${PACKAGE_VERSION}" ]; then
            echo "package.json does not contain a valid version."
            exit 1
          fi

          EXPECTED_TAG="v${PACKAGE_VERSION}"

          echo "Tag name:             ${TAG_NAME}"
          echo "package.json version: ${PACKAGE_VERSION}"
          echo "Expected tag:          ${EXPECTED_TAG}"

          if [ "${TAG_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "The pushed tag must match package.json version with a leading v."
            echo "Expected tag: ${EXPECTED_TAG}"
            echo "Actual tag:   ${TAG_NAME}"
            exit 1
          fi

      - name: Create release notes from tagged commit
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"

          {
            echo "Release ${TAG_NAME}"
            echo
            echo "Commit:"
            echo
            git log -1 --pretty=format:"%h - %s%n%n%b"
            echo
          } > release-notes.md

          echo "Release notes:"
          cat release-notes.md

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"

          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --notes-file release-notes.md \
            --verify-tag
