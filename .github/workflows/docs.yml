name: Deploy MkDocs documentation

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "package.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs>=1.4,<2" mkdocs-material pymdown-extensions

      - name: Build documentation
        working-directory: site
        run: mkdocs build --clean --site-dir ../_site

      - name: Fail if version placeholders remain
        run: |
          if grep -R "__TIKZJAX_VERSION__\|__TIKZJAX_VERSION_TAG__\|{{ tikzjax_version" -n _site; then
            echo "Some TikZJax version placeholders were not replaced."
            exit 1
          fi

      - name: Inspect generated site
        run: |
          echo "Generated site size:"
          du -sh _site

          echo ""
          echo "Number of files:"
          find _site -type f | wc -l

          echo ""
          echo "Largest files:"
          find _site -type f -exec du -h {} + | sort -hr | head -30

          echo ""
          echo "Files larger than 50 MB:"
          find _site -type f -size +50M -print -exec ls -lh {} \;

          echo ""
          echo "Symbolic links:"
          find _site -type l -print

      - name: Fail if generated site contains symbolic links
        run: |
          if find _site -type l | grep .; then
            echo "GitHub Pages artifacts must not contain symbolic links."
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy documentation
        id: deployment
        uses: actions/deploy-pages@v5