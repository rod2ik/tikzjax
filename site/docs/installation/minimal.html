<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>TikZJax Standalone Examples</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@rod2ik/tikzjax@__TIKZJAX_VERSION__/dist/fonts.min.css">

  <script src="https://cdn.jsdelivr.net/npm/@rod2ik/tikzjax@__TIKZJAX_VERSION__/dist/tikzjax.min.js"></script>
</head>

<body>
  <h1>Minimal Standalone TikZJax Examples</h1>

  <h2>Basic TikZ</h2>

  <script type="text/tikz">
  \begin{tikzpicture}
    \draw[thick, blue] (0,0) circle (1);
    \draw[red, ->] (-1.5,0) -- (1.5,0);
  \end{tikzpicture}
  </script>

  <h2>TikZ library: shapes.geometric</h2>

  <script type="text/tikz" data-tikz-libraries="shapes.geometric">
  \begin{tikzpicture}
    \node[
      star,
      star points=5,
      star point ratio=2.5,
      minimum size=1.5in,
      draw=orange,
      thick,
      fill=yellow!50
    ] {};
  \end{tikzpicture}
  </script>

  <h2>tkz-tab</h2>

  <script type="text/tikz" data-tex-packages="tkz-tab">
  \begin{tikzpicture}
    \tkzTabInit
      {$x$/1,$f'(x)$/1,$f(x)$/2}
      {$-\infty$,$0$,$+\infty$}

    \tkzTabLine{,+,z,-,}
    \tkzTabVar{-/$-\infty$,+/$2$,-/$-\infty$}
  \end{tikzpicture}
  </script>

  <h2>physics</h2>

  <script type="text/tikz" data-tex-packages="physics" data-tikz-libraries="arrows.meta,decorations.pathmorphing">
  \begin{tikzpicture}[
    >=Stealth,
    thick,
    mass/.style={
      draw=blue!70!black,
      fill=blue!10,
      rounded corners,
      minimum width=1.3cm,
      minimum height=1cm
    }
  ]
    \draw[very thick]
      (-3,-0.8) -- (-3,0.8);

    \draw[
      decorate,
      decoration={
        coil,
        aspect=0.45,
        segment length=5pt,
        amplitude=5pt
      },
      blue!70!black,
      very thick
    ]
      (-3,0) -- (0,0);

    \node[mass] (m) at (0.8,0) {
      $m$
    };

    \draw[
      -{Stealth[length=4mm]},
      red!75!black,
      very thick
    ]
      (m.west) -- ++(-1.4,0)
      node[midway,above] {
        $\vb{F}$
      };

    \draw[->,gray!70!black]
      (-3,-1.2) -- (3,-1.2)
      node[right] {$x$};
  \end{tikzpicture}
  </script>

  <h2>circuitikz</h2>

  <script type="text/tikz" data-tex-packages="circuitikz">
  \begin{circuitikz}
    \draw
      (0,0)
      to[battery1,l=$V$] (0,2)
      to[R,l=$R$] (3,2)
      -- (3,0)
      -- (0,0);
  \end{circuitikz}
  </script>

  <h2>chemfig</h2>

  <script type="text/tikz" data-tex-packages="chemfig">
\setchemfig{
  atom sep=2.4em,
  bond style={line width=0.8pt},
  double bond sep=2pt
}

\chemfig{
  HO-C(=O)-
  *6(
    -=-
    (-O-C(=O)-CH_3)
    =-=
  )
}
</script>

  <h2>yquant</h2>

  <script type="text/tikz" data-tex-packages="yquant">
  \begin{tikzpicture}
  \begin{yquant}
    qubit q[2];

    h q[0];
    cnot q[1] | q[0];

    measure q;
  \end{yquant}
  \end{tikzpicture}
  </script>

  <h2>tikz-feynhand</h2>

  <script type="text/tikz" data-tex-packages="tikz-feynhand">
  \begin{tikzpicture}
  \begin{feynhand}
    \vertex (a) at (-1.5,-1);
    \vertex (b) at (1.5,-1);
    \vertex (c) at (0,1.5);
    \vertex[dot] (o) at (0,0) {};

    \propag[fermion] (a) to (o);
    \propag[anti fermion] (b) to (o);
    \propag[photon] (o) to (c);
  \end{feynhand}
  \end{tikzpicture}
  </script>

  <h2>pgf-spectra</h2>

  <script type="text/tikz" data-tex-packages="pgf-spectra" data-width="600" data-height="190">
    \pgfspectra[
      element=He,
      width=11cm,
      height=1.6cm,
      axis,
      axis step=40,
      label
    ]
    </script>

  <h2>kinematikz</h2>

  <script type="text/tikz" data-tex-packages="kinematikz" data-width="620" data-height="320">
\begin{tikzpicture}

  \pic (base) {
    frame pivot triangle
  };

  \pic (linkA) at (base-center) {
    link bar generic={
      20:34pt/1/1/1/0
    }
  };

  \pic (linkB) at (linkA-end) {
    link bar generic={
      35:28pt/1/0/1/0
    }
  };

  \pic (linkC) at (linkB-end) {
    link bar generic={
      -20:24pt/1/0/1/0
    }
  };

\end{tikzpicture}
</script>

  <h2>braids (TikZ library)</h2>

  <script type="text/tikz" data-tikz-libraries="braids">
  \begin{tikzpicture}
    \pic[
      braid/.cd,
      every strand/.style={very thick},
      strand 1/.style={red},
      strand 2/.style={green!60!black},
      strand 3/.style={blue}
    ] {
      braid={
        s_1
        s_2^{-1}
        s_1
      }
    };
  \end{tikzpicture}
  </script>
</body>

</html>
